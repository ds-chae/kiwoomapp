	<!DOCTYPE html>
	<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>uploads/images - {IP_SUFFIX}</title>
		<style>
			* { margin: 0; padding: 0; box-sizing: border-box; }
			body {
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				min-height: 100vh;
				padding: 20px 0 24px;
			}
			.page-shell {
				max-width: 1200px;
				margin: 0 auto;
				padding: 0 20px;
			}
			.page-wrap {
				background: #fff;
				border-radius: 12px;
				box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
				overflow: hidden;
			}
			.top-bar {
				display: flex;
				flex-wrap: wrap;
				align-items: center;
				gap: 12px;
				padding: 16px 20px;
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: #fff;
			}
			.btn-back {
				display: inline-block;
				padding: 8px 16px;
				background: rgba(255, 255, 255, 0.2);
				color: #fff;
				border: 1px solid rgba(255, 255, 255, 0.35);
				border-radius: 6px;
				text-decoration: none;
				font-size: 14px;
				font-weight: 600;
			}
			.btn-back:hover {
				background: rgba(255, 255, 255, 0.3);
			}
			.top-bar h1 {
				font-size: 1.25rem;
				font-weight: 600;
				flex: 1;
				min-width: 160px;
			}
			.body-pad {
				padding: 20px;
			}
			.image-list-toolbar {
				display: flex;
				flex-wrap: wrap;
				gap: 8px;
				align-items: center;
				margin-bottom: 16px;
			}
			.image-sort-btn {
				padding: 6px 14px;
				border: 1px solid #c5cad8;
				border-radius: 6px;
				background: #fff;
				cursor: pointer;
				font-size: 13px;
				font-weight: 600;
				color: #333;
			}
			.image-sort-btn:hover {
				background: #f0f2f8;
			}
			.image-sort-btn.active {
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				color: #fff;
				border-color: transparent;
			}
			.image-grid-stage {
				width: 100%;
				background: #fff;
				padding: 16px 0 16px;
				box-sizing: border-box;
				margin-top: 12px;
				box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
			}
			.upload-image-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr));
				gap: 14px;
				padding: 0;
				width: 100%;
				max-width: none;
			}
			.upload-image-tile {
				border: 1px solid #e0e0e0;
				border-radius: 8px;
				overflow: hidden;
				background: #fafafa;
				display: flex;
				flex-direction: column;
			}
			.upload-image-tile img {
				width: 100%;
				height: clamp(200px, 44vw, 320px);
				object-fit: cover;
				display: block;
				background: #eee;
				cursor: pointer;
			}
			.upload-image-tile-caption {
				padding: 10px 12px;
				font-size: 13px;
				font-weight: 600;
				line-height: 1.35;
				word-break: break-all;
				color: #222;
				flex: 0 0 auto;
			}
			#image-list-loading {
				text-align: center;
				padding: 20px;
				color: #666;
			}
			#image-list-empty {
				text-align: center;
				padding: 32px;
				color: #888;
				display: none;
			}
			#image-list-error {
				display: none;
				padding: 12px;
				margin-bottom: 12px;
				background: #f8d7da;
				color: #721c24;
				border-radius: 6px;
				font-size: 14px;
			}

			.image-lightbox {
				display: none;
				position: fixed;
				z-index: 100000;
				left: 0;
				top: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.88);
				align-items: center;
				justify-content: center;
				flex-direction: column;
				padding: 48px 16px 24px;
				box-sizing: border-box;
			}
			.image-lightbox.show {
				display: flex;
			}
			.image-lightbox-inner {
				position: relative;
				max-width: 100%;
				max-height: 100%;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
			}
			.image-lightbox-inner img {
				max-width: min(100%, 96vw);
				max-height: min(85vh, calc(100vh - 120px));
				width: auto;
				height: auto;
				object-fit: contain;
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
				border-radius: 4px;
			}
			.image-lightbox-close {
				position: absolute;
				top: 8px;
				right: 8px;
				z-index: 2;
				width: 40px;
				height: 40px;
				border: none;
				border-radius: 50%;
				background: rgba(255, 255, 255, 0.95);
				color: #333;
				font-size: 26px;
				line-height: 1;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
			}
			.image-lightbox-close:hover {
				background: #fff;
			}
			.image-lightbox-meta {
				margin-top: 12px;
				max-width: 96vw;
				text-align: center;
				color: #e8e8e8;
				font-size: 13px;
				line-height: 1.4;
				word-break: break-all;
			}
			.image-lightbox-meta .image-lightbox-name {
				font-weight: 600;
				color: #fff;
				margin-bottom: 4px;
			}
			.image-lightbox-meta .image-lightbox-dim {
				font-size: 12px;
				opacity: 0.85;
			}
		</style>
	</head>
	<body>
		<div class="page-shell">
			<div class="page-wrap">
				<div class="top-bar">
					<a class="btn-back" href="/stock/">← 이전 화면</a>
					<h1>uploads/images</h1>
				</div>
				<div class="body-pad">
					<div class="image-list-toolbar">
						<span style="font-size:13px;color:#555;font-weight:600;">파일명 정렬</span>
						<button type="button" class="image-sort-btn active" id="image-sort-asc">오름차순</button>
						<button type="button" class="image-sort-btn" id="image-sort-desc">내림차순</button>
					</div>
					<div id="image-list-error"></div>
					<div id="image-list-loading">불러오는 중…</div>
					<div id="image-list-empty">이미지가 없습니다.</div>
				</div>
			</div>
		</div>
		<div class="image-grid-stage">
			<div id="image-list-grid" class="upload-image-grid"></div>
		</div>

		<div id="image-lightbox" class="image-lightbox" aria-hidden="true">
			<div class="image-lightbox-inner" id="image-lightbox-inner">
				<button type="button" class="image-lightbox-close" id="image-lightbox-close" aria-label="닫기">&times;</button>
				<img id="image-lightbox-img" src="" alt="">
				<div class="image-lightbox-meta">
					<div class="image-lightbox-name" id="image-lightbox-name"></div>
					<div class="image-lightbox-dim" id="image-lightbox-dim"></div>
				</div>
			</div>
		</div>

		<script>
			var uploadImageListSortDesc = false;
			var uploadImageListCachedNames = [];

			function setImageListSort(desc) {
				uploadImageListSortDesc = !!desc;
				document.getElementById('image-sort-asc').classList.toggle('active', !uploadImageListSortDesc);
				document.getElementById('image-sort-desc').classList.toggle('active', uploadImageListSortDesc);
				renderImageListGrid();
			}

			function openImageLightbox(src, filename) {
				var box = document.getElementById('image-lightbox');
				var full = document.getElementById('image-lightbox-img');
				var nameEl = document.getElementById('image-lightbox-name');
				var dimEl = document.getElementById('image-lightbox-dim');
				nameEl.textContent = filename;
				dimEl.textContent = '로딩 중…';
				full.onload = function () {
					dimEl.textContent = full.naturalWidth + ' × ' + full.naturalHeight + ' px';
				};
				full.onerror = function () {
					dimEl.textContent = '이미지를 불러올 수 없습니다.';
				};
				full.src = src;
				full.alt = filename;
				box.classList.add('show');
				box.setAttribute('aria-hidden', 'false');
				document.body.style.overflow = 'hidden';
			}

			function closeImageLightbox() {
				var box = document.getElementById('image-lightbox');
				var full = document.getElementById('image-lightbox-img');
				box.classList.remove('show');
				box.setAttribute('aria-hidden', 'true');
				full.removeAttribute('src');
				full.onload = null;
				full.onerror = null;
				document.body.style.overflow = '';
			}

			function renderImageListGrid() {
				var grid = document.getElementById('image-list-grid');
				var emptyEl = document.getElementById('image-list-empty');
				var errEl = document.getElementById('image-list-error');
				errEl.style.display = 'none';
				var names = uploadImageListCachedNames.slice().sort(function (a, b) {
					var c = a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
					return uploadImageListSortDesc ? -c : c;
				});
				grid.innerHTML = '';
				if (!names.length) {
					emptyEl.style.display = 'block';
					return;
				}
				emptyEl.style.display = 'none';
				names.forEach(function (name) {
					var tile = document.createElement('div');
					tile.className = 'upload-image-tile';
					var src = './api/upload-images/' + encodeURIComponent(name) + '/file';
					var img = document.createElement('img');
					img.src = src;
					img.alt = name;
					img.loading = 'lazy';
					img.addEventListener('click', function (e) {
						e.preventDefault();
						e.stopPropagation();
						openImageLightbox(src, name);
					});
					var cap = document.createElement('div');
					cap.className = 'upload-image-tile-caption';
					cap.textContent = name;
					cap.title = name;
					tile.appendChild(img);
					tile.appendChild(cap);
					grid.appendChild(tile);
				});
			}

			async function loadImageList() {
				var loading = document.getElementById('image-list-loading');
				var errEl = document.getElementById('image-list-error');
				var grid = document.getElementById('image-list-grid');
				var emptyEl = document.getElementById('image-list-empty');
				loading.style.display = 'block';
				grid.innerHTML = '';
				emptyEl.style.display = 'none';
				errEl.style.display = 'none';
				try {
					var res = await fetch('./api/upload-images', { credentials: 'same-origin' });
					var text = await res.text();
					var data = {};
					try { data = JSON.parse(text); } catch (e) {}
					if (res.status === 401) {
						var loginPath = window.location.pathname.indexOf('/stock') === 0 ? '/stock/login' : '/login';
						window.location.href = loginPath;
						return;
					}
					if (!res.ok || data.status !== 'success') {
						var det = data.detail || data.message || text || ('Error ' + res.status);
						if (Array.isArray(det)) {
							det = det.map(function (x) { return x.msg || JSON.stringify(x); }).join('; ');
						}
						errEl.textContent = typeof det === 'string' ? det : JSON.stringify(det);
						errEl.style.display = 'block';
						uploadImageListCachedNames = [];
						return;
					}
					uploadImageListCachedNames = Array.isArray(data.data) ? data.data : [];
					setImageListSort(uploadImageListSortDesc);
				} catch (e) {
					errEl.textContent = String(e);
					errEl.style.display = 'block';
					uploadImageListCachedNames = [];
				} finally {
					loading.style.display = 'none';
				}
			}

			document.getElementById('image-sort-asc').addEventListener('click', function () { setImageListSort(false); });
			document.getElementById('image-sort-desc').addEventListener('click', function () { setImageListSort(true); });

			document.getElementById('image-lightbox-close').addEventListener('click', function (e) {
				e.stopPropagation();
				closeImageLightbox();
			});
			document.getElementById('image-lightbox').addEventListener('click', function (e) {
				if (e.target === document.getElementById('image-lightbox')) {
					closeImageLightbox();
				}
			});
			document.getElementById('image-lightbox-inner').addEventListener('click', function (e) {
				e.stopPropagation();
			});
			document.addEventListener('keydown', function (e) {
				if (e.key === 'Escape' && document.getElementById('image-lightbox').classList.contains('show')) {
					closeImageLightbox();
				}
			});

			loadImageList();
		</script>
	</body>
	</html>
