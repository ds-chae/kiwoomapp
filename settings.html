<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설정 - {IP_SUFFIX}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .wrap {
            max-width: 560px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .top {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .top h1 { font-size: 18px; }
        .back-btn {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 6px;
            padding: 7px 14px;
            background: rgba(255,255,255,0.18);
            font-weight: 600;
        }
        .content { padding: 22px 20px 24px; }
        .hint {
            font-size: 13px;
            color: #666;
            margin-bottom: 18px;
            line-height: 1.45;
        }
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #444;
        }
        .field input, .field select {
            width: 100%;
            border: 1px solid #d0d4e2;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            background: #fff;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .btn-save:hover { opacity: 0.92; }
        .btn-reload {
            background: #f0f2f7;
            color: #444;
        }
        .msg {
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }
        .msg.ok { display: block; background: #e8f7ef; color: #1b7a45; }
        .msg.err { display: block; background: #fdecea; color: #b42318; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="top">
            <h1>설정 (PC Defaults)</h1>
            <a class="back-btn" id="back-link" href="/stock">← 돌아가기</a>
        </div>
        <div class="content">
            <p class="hint">
                pctoken 요청 시 사용되는 기본값입니다.<br>
                저장 시 <code>pc_settings.json</code>에 반영됩니다.
            </p>

            <div class="field">
                <label for="pc-color">pc_color</label>
                <select id="pc-color">
                    <option value="R">빨 (R)</option>
                    <option value="O">주 (O)</option>
                    <option value="Y">노 (Y)</option>
                    <option value="G">초 (G)</option>
                    <option value="B">파 (B)</option>
                    <option value="D">남 (D)</option>
                    <option value="V">보 (V)</option>
                </select>
            </div>

            <div class="field">
                <label for="pc-sellrate">pc_sellrate</label>
                <input type="number" id="pc-sellrate" step="0.01" />
            </div>

            <div class="field">
                <label for="pc-bamount">pc_bamount</label>
                <input type="number" id="pc-bamount" step="1" />
            </div>

            <div class="actions">
                <button type="button" class="btn btn-reload" onclick="loadSettings()">새로고침</button>
                <button type="button" class="btn btn-save" onclick="saveSettings()">저장</button>
            </div>
            <div id="msg" class="msg"></div>
        </div>
    </div>

    <script>
        const API_BASE = location.pathname.indexOf('/stock') === 0 ? '/stock' : '';

        function setMsg(text, ok) {
            const el = document.getElementById('msg');
            el.textContent = text || '';
            el.className = 'msg ' + (ok ? 'ok' : 'err');
            if (!text) el.className = 'msg';
        }

        async function loadSettings() {
            setMsg('', true);
            try {
                const res = await fetch(API_BASE + '/api/pc-settings', { credentials: 'same-origin' });
                if (res.status === 401) {
                    location.href = API_BASE + '/login';
                    return;
                }
                const j = await res.json();
                if (j.status !== 'success') {
                    setMsg(j.message || '불러오기 실패', false);
                    return;
                }
                const d = j.data || {};
                const color = (d.pc_color || 'Y').toString().trim().toUpperCase();
                const sel = document.getElementById('pc-color');
                if ([...sel.options].some(o => o.value === color)) sel.value = color;
                else sel.value = 'Y';
                document.getElementById('pc-sellrate').value = d.pc_sellrate;
                document.getElementById('pc-bamount').value = d.pc_bamount;
            } catch (e) {
                setMsg('불러오기 오류: ' + e.message, false);
            }
        }

        async function saveSettings() {
            setMsg('', true);
            const body = {
                pc_color: document.getElementById('pc-color').value,
                pc_sellrate: document.getElementById('pc-sellrate').value,
                pc_bamount: document.getElementById('pc-bamount').value,
            };
            try {
                const res = await fetch(API_BASE + '/api/pc-settings', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (res.status === 401) {
                    location.href = API_BASE + '/login';
                    return;
                }
                const j = await res.json();
                if (j.status !== 'success') {
                    setMsg(j.message || '저장 실패', false);
                    return;
                }
                const d = j.data || {};
                document.getElementById('pc-color').value = (d.pc_color || body.pc_color).toString().trim().toUpperCase();
                document.getElementById('pc-sellrate').value = d.pc_sellrate;
                document.getElementById('pc-bamount').value = d.pc_bamount;
                setMsg('저장되었습니다.', true);
            } catch (e) {
                setMsg('저장 오류: ' + e.message, false);
            }
        }

        document.getElementById('back-link').href = API_BASE + '/';
        loadSettings();
    </script>
</body>
</html>
